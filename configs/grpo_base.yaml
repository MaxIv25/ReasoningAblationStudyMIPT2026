# ============================================================
# Base config for GRPO experiments — shared across all variants
# Inherits model/eval settings from configs/base.yaml via load_config
# ============================================================

model:
  name: "Qwen/Qwen3.5-0.8B-Base"
  torch_dtype: "bfloat16"

grpo:
  # Loss formulation (overridden per experiment)
  loss_type: "grpo"

  # Generation
  num_generations: 8            # Group size G — 8 completions per prompt
  max_completion_length: 16384  # 16K tokens — fits on H200 with 0.8B model

  # Dataset size for RL training
  # Literature: TinyZero uses 3K for 0.5B, SimpleRL uses 8K for 1.5B
  num_samples: 3000

  # Clipping (PPO-style)
  epsilon: 0.2                 # Standard symmetric clip
  # epsilon_high: null         # Set only for DAPO (asymmetric)

  # KL divergence
  beta: 0.0                   # No KL penalty — modern practice for reasoning

  # Reward scaling
  scale_rewards: "group"       # Normalize by group std (default GRPO)

  # Truncation
  mask_truncated_completions: true  # Ignore completions that hit max length

  # Generation batching
  # Process 8 prompts × 8 generations = 64 completions per vLLM call
  # Reduces vLLM API calls from 20,000 to 2,500 — massive throughput gain
  generation_batch_size: 64

  # vLLM
  use_vllm: true
  vllm_mode: "server"              # Separate GPU for vLLM — no memory contention
  vllm_server_port: 8456            # Non-default port to avoid conflicts

training:
  per_device_train_batch_size: 2   # 2 completions per micro-batch (vocab 248K limits this)
  gradient_accumulation_steps: 32  # 32 × 2 = 64 completions = 8 prompts per optimizer step
                                   # Matches generation_batch_size → 1 gen call per optimizer step
                                   # Literature: TinyZero/SimpleRL use 8 prompts per step
  learning_rate: 1.0e-6            # Safe with 8-prompt effective batch (was 5e-7 for 1-prompt batch)
                                   # DeepSeek-R1/SimpleRL use 1e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  num_train_epochs: 1              # On-policy RL: 2nd epoch useless (policy already updated)
  save_steps: 75                    # saves at 75,150,225,300,375 — only last 2 kept on disk
  save_total_limit: 2
  logging_steps: 5                 # Frequent logging for short run
  dataloader_num_workers: 4        # Async data loading

eval:
  benchmarks:
    - gsm8k
    - math500
    - math_hard
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  max_new_tokens: 8192
