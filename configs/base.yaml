# ============================================================
# Base config — shared across all SFT ablation experiments
# ============================================================

model:
  name: "Qwen/Qwen3.5-0.8B-Base"
  # Если модель скачана в кастомную директорию, укажите путь:
  # name: "/path/to/local/Qwen3.5-4B-Base"
  max_seq_len: 16384      # Cover 95% of R1 traces (was 8192, truncating 25%)
  torch_dtype: "bfloat16"

teacher:
  name: "Qwen/Qwen3.5-35B-A3B"
  # name: "/path/to/local/Qwen3.5-35B-A3B"

training:
  per_device_train_batch_size: 2    # batch=4 OOM at 16K (logits=60GB)
  gradient_accumulation_steps: 8    # effective batch = 16
  packing: true                     # pack short examples into one seq → ~2x speedup
  save_total_limit: 2               # was 5 — save disk space
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  save_strategy: "steps"
  save_steps: 500
  logging_steps: 50
  eval_steps: 500

  # Full FT defaults
  # LR=1e-5: standard for SFT on reasoning traces.
  # Слишком большой LR ломает pretrained знания, слишком маленький — модель не учится.
  # DeepSeek-R1 paper и Open-R1 репорты используют порядок 1e-5 для Full FT.
  full_ft:
    learning_rate: 1.0e-5
    num_train_epochs: 2

  # LoRA/DoRA/PiSSA defaults
  # LR=2e-4: LoRA обновляет мало параметров → можно агрессивнее.
  # r=64, alpha=128 → effective scaling = alpha/r = 2.0
  lora:
    learning_rate: 2.0e-4
    num_train_epochs: 3
    r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    target_modules: "all-linear"

  # Cosine scheduler включён по умолчанию (lr_scheduler_type: "cosine" в train_sft.py).
  # Phase 4 будет аблировать scheduler (constant LR, linear decay, etc.)

data:
  dataset: "open-r1/OpenR1-Math-220k"
  split: "train"
  num_samples: 20000
  seed: 42
  eval_fraction: 0.05   # 5% held-out for eval loss
  
  # Фильтрация R1 трасс (из колонки `generations`)
  # С max_seq_len=16384 покрываем 95% данных (P95=14364 токенов).
  # Оставшиеся ~5% (>16K) обрезаются — это сверхдлинные трассы.
  filter:
    min_trace_words: 20       # убрать слишком короткие/пустые
    require_think_tags: true  # только трассы с <think>...</think>
    require_boxed: true       # только трассы с \boxed{} ответом

eval:
  benchmarks:
    - gsm8k
    - math500
    - aime2026
    - math_hard
  max_new_tokens: 16384
  # Qwen3 best practices: для thinking mode НЕ использовать greedy!
  # "DO NOT use greedy decoding, as it can lead to performance degradation
  #  and endless repetitions."
  temperature: 0.6       # Qwen3 recommended for thinking mode
  top_p: 0.95            # Qwen3 recommended
  top_k: 20              # Qwen3 recommended
  prompt_template: "Please reason step by step, and put your final answer within \\boxed{}."

logging:
  report_to: "tensorboard"   # tensorboard logs → outputs/runs/
  # Для просмотра: tensorboard --logdir outputs/
  log_steps: 50
  eval_steps: 200
